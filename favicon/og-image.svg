      <stop offset="0%" stop-color="#050814"/>
      <stop offset="100%" stop-color="#0A1128"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="none" stroke="#0074FF" stroke-width="0.5" opacity="0.3"/>
  
  <!-- Logo mark -->
  <rect x="60" y="60" width="90" height="90" rx="18" fill="#07111F" stroke="#0074FF" stroke-width="2"/>
  <text x="105" y="120" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="52" font-weight="700" fill="#0074FF">A</text>
  
  <!-- Name -->
