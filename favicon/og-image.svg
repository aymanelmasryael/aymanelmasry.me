<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050814"/>
      <stop offset="100%" stop-color="#0A1128"/>
    </linearGradient>
    <linearGradient id="glow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#0074FF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0074FF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0074FF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#0074FF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0074FF" stop-opacity="0"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Subtle glow behind logo area -->
  <circle cx="105" cy="105" r="140" fill="url(#glow)"/>
  
  <!-- Subtle grid dots -->
  <g fill="#1E293B" opacity="0.3">
    <circle cx="40" cy="40" r="1.5"/><circle cx="120" cy="40" r="1.5"/><circle cx="200" cy="40" r="1.5"/><circle cx="280" cy="40" r="1.5"/><circle cx="360" cy="40" r="1.5"/>
    <circle cx="40" cy="120" r="1.5"/><circle cx="200" cy="120" r="1.5"/><circle cx="280" cy="120" r="1.5"/><circle cx="360" cy="120" r="1.5"/>
    <circle cx="40" cy="200" r="1.5"/><circle cx="120" cy="200" r="1.5"/><circle cx="200" cy="200" r="1.5"/><circle cx="280" cy="200" r="1.5"/><circle cx="360" cy="200" r="1.5"/>
    <circle cx="40" cy="280" r="1.5"/><circle cx="120" cy="280" r="1.5"/><circle cx="200" cy="280" r="1.5"/><circle cx="280" cy="280" r="1.5"/><circle cx="360" cy="280" r="1.5"/>
    <circle cx="40" cy="360" r="1.5"/><circle cx="120" cy="360" r="1.5"/><circle cx="200" cy="360" r="1.5"/><circle cx="280" cy="360" r="1.5"/><circle cx="360" cy="360" r="1.5"/>
    <circle cx="40" cy="440" r="1.5"/><circle cx="120" cy="440" r="1.5"/><circle cx="200" cy="440" r="1.5"/><circle cx="280" cy="440" r="1.5"/><circle cx="360" cy="440" r="1.5"/>
    <circle cx="40" cy="520" r="1.5"/><circle cx="120" cy="520" r="1.5"/><circle cx="200" cy="520" r="1.5"/><circle cx="280" cy="520" r="1.5"/><circle cx="360" cy="520" r="1.5"/>
    <circle cx="40" cy="600" r="1.5"/><circle cx="120" cy="600" r="1.5"/><circle cx="200" cy="600" r="1.5"/><circle cx="280" cy="600" r="1.5"/><circle cx="360" cy="600" r="1.5"/>
  </g>
  
  <!-- Border accent -->
  <rect x="1" y="1" width="1198" height="628" rx="4" fill="none" stroke="#0074FF" stroke-width="0.5" opacity="0.2"/>
  
  <!-- Logo mark -->
  <rect x="60" y="60" width="90" height="90" rx="18" fill="#07111F" stroke="#0074FF" stroke-width="2.5"/>
  <text x="105" y="120" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="52" font-weight="700" fill="#0074FF">A</text>
  
  <!-- Name -->
  <text x="180" y="108" font-family="Inter, Arial, sans-serif" font-size="50" font-weight="700" fill="#F1F5F9" letter-spacing="-0.5">Ayman Elmasry</text>
  
  <!-- Tagline -->
  <text x="180" y="158" font-family="Inter, Arial, sans-serif" font-size="20" fill="#94A3B8" letter-spacing="0.5">Visionary Architect · AI Orchestrator · Brand Designer</text>
  
  <!-- Divider line -->
  <rect x="180" y="178" width="280" height="2" rx="1" fill="url(#line)"/>
  
  <!-- AEL -->
  <text x="180" y="215" font-family="Inter, Arial, sans-serif" font-size="15" fill="#64748B" letter-spacing="2">FOUNDER — AEL DIGITAL STUDIO</text>
  
  <!-- Right side decorative element -->
  <g opacity="0.08">
    <rect x="920" y="80" width="220" height="220" rx="30" fill="none" stroke="#0074FF" stroke-width="1"/>
    <rect x="950" y="110" width="160" height="160" rx="22" fill="none" stroke="#0074FF" stroke-width="1"/>
    <rect x="975" y="135" width="110" height="110" rx="16" fill="none" stroke="#0074FF" stroke-width="1"/>
  </g>
  
  <!-- URL -->
  <text x="180" y="575" font-family="Inter, Arial, sans-serif" font-size="15" fill="#0074FF" letter-spacing="1">aymanelmasry.me</text>
</svg>
