<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Business Card — Ayman Elmasry</title>
  <meta name="robots" content="noindex"/>
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Source Serif 4', Georgia, serif;
      background: #050814;
      color: #F1F5F9;
      min-height: 100vh;
      padding: 3rem 2rem;
    }
    h1 {
      text-align: center;
      font-weight: 600;
      font-size: 20px;
      letter-spacing: 1px;
      color: #64748B;
      margin-bottom: 0.5rem;
    }
    .subtitle {
      text-align: center;
      font-size: 13px;
      color: #475569;
      margin-bottom: 3rem;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2.5rem;
      max-width: 1200px;
      margin: 0 auto;
    }
    @media (max-width: 800px) {
      .grid { grid-template-columns: 1fr; }
    }
    .option {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .label {
      font-size: 13px;
      letter-spacing: 2px;
      color: #94A3B8;
      margin-bottom: 1rem;
    }
    .card-frame {
      width: 100%;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0, 116, 255, 0.08);
      transition: box-shadow 0.3s;
    }
    .card-frame:hover {
      box-shadow: 0 20px 60px rgba(0, 116, 255, 0.15);
    }
    .card-frame img {
      width: 100%;
      height: auto;
      display: block;
    }
    .actions {
      margin-top: 1.25rem;
      display: flex;
      gap: 0.75rem;
    }
    .btn {
      padding: 0.6rem 1.5rem;
      border-radius: 4px;
      border: 1px solid #0074FF;
      color: #0074FF;
      text-decoration: none;
      font-size: 12px;
      letter-spacing: 0.5px;
      transition: all 0.2s;
      font-family: Inter, Arial, sans-serif;
    }
    .btn:hover {
      background: #0074FF;
      color: #fff;
    }
    .btn-download {
      background: #0074FF;
      color: #fff;
    }
    .btn-download:hover {
      background: #0052CC;
      border-color: #0052CC;
    }
  </style>
</head>
<body>
  <h1>Business Card</h1>
  <p class="subtitle">Ayman Elmasry — Two concepts</p>
  <div class="grid">
    <div class="option">
      <span class="label">V1 · QR First</span>
      <div class="card-frame">
        <img src="business-card-v1.svg" alt="Version 1: QR first"/>
      </div>
      <div class="actions">
        <a class="btn btn-download" href="business-card-v1.png" download>PNG</a>
        <a class="btn" href="business-card-v1.svg" download>SVG</a>
      </div>
    </div>
    <div class="option">
      <span class="label">V2 · Info First</span>
      <div class="card-frame">
        <img src="business-card-v2.svg" alt="Version 2: Info first"/>
      </div>
      <div class="actions">
        <a class="btn btn-download" href="business-card-v2.png" download>PNG</a>
        <a class="btn" href="business-card-v2.svg" download>SVG</a>
      </div>
    </div>
  </div>
</body>
</html>
